name: data_platform
version: "1.0.0"
config-version: 2

profile: data_platform

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  data_platform:
    staging:
      +schema: silver_staging
      +materialized: view
      +tags: ["silver", "staging"]
    marts:
      +schema: silver
      +materialized: table
      +tags: ["silver", "marts"]
